services:
  # Backend API
  - type: web
    name: written-entity-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd written-entity-backend && npm install && npx prisma generate && npm run build
    startCommand: cd written-entity-backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://written-entity-frontend.onrender.com

  # Frontend Static Site
  - type: static
    name: written-entity-frontend
    env: static
    buildCommand: echo "No build needed"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /the-written-entity.html
