[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["cd written-entity-backend && npm ci --prefer-offline || npm install"]

[phases.build]
cmds = ["cd written-entity-backend && npx prisma generate && npm run build"]

[start]
cmd = "cd written-entity-backend && npx prisma db push --accept-data-loss && npm start"
